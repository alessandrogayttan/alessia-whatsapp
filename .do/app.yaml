name: alessia-whatsapp
region: nyc
services:
  - name: alessia
    github:
      repo: alessandrogayttan/alessia-whatsapp
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: python
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xs
    run_command: gunicorn --bind 0.0.0.0:8080 --workers 1 --timeout 120 --graceful-timeout 30 wsgi:app
    health_check:
      http_path: /health/ready
      initial_delay_seconds: 40
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: TOKEN_WHATSAPP
        type: SECRET
        scope: RUN_TIME
      - key: ID_TELEFONO
        type: SECRET
        scope: RUN_TIME
      - key: META_APP_ID
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_VERIFY_TOKEN
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_APP_SECRET
        type: SECRET
        scope: RUN_TIME
      - key: WEBHOOK_CALLBACK_URL
        value: "https://alessia-whatsapp-jbems.ondigitalocean.app/webhook"
      - key: GEMINI_API_KEY
        type: SECRET
        scope: RUN_TIME
      - key: ID_HOJA_CALCULO
        type: SECRET
        scope: RUN_TIME
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        type: SECRET
        scope: RUN_TIME
      - key: DATABASE_PATH
        value: /data/alessia.db
      - key: BACKUP_DIR
        value: /data/backups
      - key: ENABLE_SCHEDULER
        value: "1"
      - key: ENABLE_LAUNCH_ACK
        value: "0"
      - key: ENABLE_MODO_EQUIPO
        value: "1"
      - key: EQUIPO_CLAVE_HASH
        type: SECRET
        scope: RUN_TIME
      - key: HEALTH_CONFIG_SECRET
        type: SECRET
        scope: RUN_TIME
      - key: RECEPCION_WHATSAPP
        type: SECRET
        scope: RUN_TIME
      - key: BANORTE_CLABE
        type: SECRET
        scope: RUN_TIME
      - key: BANORTE_TARJETA
        type: SECRET
        scope: RUN_TIME
      - key: BANORTE_TITULAR
        type: SECRET
        scope: RUN_TIME
      - key: BANAMEX_CLABE
        type: SECRET
        scope: RUN_TIME
      - key: BANAMEX_CUENTA
        type: SECRET
        scope: RUN_TIME
      - key: BANAMEX_TITULAR
        value: "Inpulso 43"
      - key: WHATSAPP_TEMPLATE_24H
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_TEMPLATE_2H
        type: SECRET
        scope: RUN_TIME
      - key: API_KEY_MAPS
        type: SECRET
        scope: RUN_TIME
      - key: LINK_SESION_ONLINE
        type: SECRET
        scope: RUN_TIME
      - key: SENTRY_DSN
        type: SECRET
        scope: RUN_TIME
      - key: BACKUP_S3_ENDPOINT
        type: SECRET
        scope: RUN_TIME
      - key: BACKUP_S3_BUCKET
        type: SECRET
        scope: RUN_TIME
      - key: BACKUP_S3_ACCESS_KEY
        type: SECRET
        scope: RUN_TIME
      - key: BACKUP_S3_SECRET_KEY
        type: SECRET
        scope: RUN_TIME
      - key: BACKUP_S3_REGION
        value: nyc3
      - key: WHATSAPP_SARA
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_MAGUI
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_JUAN
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_PATRICIA
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_REBECA
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_BETTY
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_IVAN
        type: SECRET
        scope: RUN_TIME
      - key: WHATSAPP_NUTRICION
        type: SECRET
        scope: RUN_TIME
      - key: MEDIA_MAX_BYTES
        value: "15728640"
    mount:
      path: /data
      volume: alessia-data
volumes:
  - name: alessia-data
    region: nyc
    size: 1Gi
